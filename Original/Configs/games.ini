; UIX Desktop - Game Library
;
; Add games here or use Title Maker (F3) to create entries.
; Steam games can be auto-imported from the Title Maker.
;
; Format:
;   [Game Name]
;   TitleID=<8-char hex ID>
;   Launch=<steam:// URL, path to executable, or xemu command>
;   Drive=E
;   Category=<Games, Apps, or Emulators>
;
; Examples:
;
;   [Half-Life 2]
;   TitleID=00044c80
;   Launch=steam://rungameid/220
;   Drive=E
;   Category=Games
;
;   [Halo - Combat Evolved]
;   TitleID=4d530004
;   Launch="/path/to/xemu" -machine xbox,short-animation=on -dvd_path "/path/to/halo.iso"
;   Drive=E
;   Category=Games
