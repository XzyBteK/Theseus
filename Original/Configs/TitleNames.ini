; TitleNames.ini -- Folder-name to display-name overrides
;
; Lets the launcher show a friendlier name for a given folder. Optional;
; populated by users for their own installs. Leave empty by default.
;
; Format:
;   [default]
;   <FolderName>=<DisplayName>
;
; Example:
;   [default]
;   UIX FTP=UIXLiteFTP
;   XeniumTools=Xenium-Tools
;
[default]
